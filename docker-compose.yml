services:
  # Postgres local com pgvector — opcional se usar Supabase direto
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ticco
      POSTGRES_PASSWORD: ticco
      POSTGRES_DB: ticco_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticco"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API local
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
