name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # toda segunda 6h UTC — detecta CVEs novos

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # detect-secrets precisa do histórico completo

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install security tools
        run: |
          pip install --upgrade pip
          pip install bandit[toml] pip-audit detect-secrets
          pip install -r requirements.txt

      # ── 1. SAST — Bandit ─────────────────────────────────────────────────────
      - name: Bandit SAST (falha em High)
        run: |
          bandit -r app/ -ll -ii -f sarif -o bandit-report.sarif || true
          bandit -r app/ -ll -ii
        # -ll = minimum severity Low, -ii = minimum confidence Medium
        # Falha se encontrar High severity + Medium confidence

      # ── 2. CVE check — pip-audit ──────────────────────────────────────────────
      - name: pip-audit CVE check
        run: pip-audit --requirement requirements.txt --strict

      # ── 3. Secrets — detect-secrets ──────────────────────────────────────────
      - name: detect-secrets (segredos hardcoded)
        run: |
          if [ -f .secrets.baseline ]; then
            detect-secrets scan --baseline .secrets.baseline
            detect-secrets audit .secrets.baseline --report --fail-on-unaudited
          else
            SCAN=$(detect-secrets scan)
            RESULTS=$(echo "$SCAN" | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          secrets=data.get('results',{})
          count=sum(len(v) for v in secrets.values())
          print(count)
          ")
            if [ "$RESULTS" -gt 0 ]; then
              echo "::error::$RESULTS segredo(s) detectado(s). Rode 'detect-secrets scan > .secrets.baseline' e revise."
              echo "$SCAN" | python3 -c "import json,sys; d=json.load(sys.stdin); [print(f,v) for f,vs in d.get('results',{}).items() for v in vs]"
              exit 1
            fi
            echo "✓ Nenhum segredo detectado"
          fi

      # ── 4. Testes de segurança ────────────────────────────────────────────────
      - name: Run security tests
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost/test
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-supabase-key
          JWT_SECRET: test-jwt-secret-with-enough-length-for-hs256
          STRIPE_WEBHOOK_SECRET: whsec_test_dummy
          STRIPE_SECRET_KEY: sk_test_dummy
          ZAPI_INSTANCE_ID: test-instance
          ZAPI_TOKEN: test-zapi-token
          ZAPI_SECURITY_TOKEN: test-zapi-security-token
          ANTHROPIC_API_KEY: sk-ant-test-dummy
          GROQ_API_KEY: gsk_test_dummy
          OPENAI_API_KEY: sk-test-dummy
          CLICKSIGN_WEBHOOK_SECRET: clicksign-test-secret
        run: |
          pip install pytest pytest-asyncio httpx
          pytest tests/security/ -v --tb=short

      # ── 5. Upload SARIF pro GitHub Security ──────────────────────────────────
      - name: Upload Bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-report.sarif
        continue-on-error: true

  security-score:
    name: Security Score Gate
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - uses: actions/checkout@v4

      - name: Verificar score mínimo no SECURITY_AUDIT.md
        run: |
          if [ ! -f SECURITY_AUDIT.md ]; then
            echo "::warning::SECURITY_AUDIT.md não encontrado — score não verificado"
            exit 0
          fi

          # Extrai score do formato "**Score: 79/100**"
          SCORE=$(grep -oP '(?<=Score:\s)\d+(?=/100)' SECURITY_AUDIT.md | head -1)
          if [ -z "$SCORE" ]; then
            echo "::warning::Score não encontrado no SECURITY_AUDIT.md"
            exit 0
          fi

          echo "Security score: $SCORE/100"
          if [ "$SCORE" -lt 75 ]; then
            echo "::error::Score $SCORE está abaixo do mínimo aceitável (75/100). Execute a skill ticco-security-audit e corrija os findings pendentes."
            exit 1
          fi
          echo "✓ Score $SCORE/100 — acima do threshold de 75"
